<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 280px;
            padding: 15px;
            font-family: -apple-system, system-ui, sans-serif;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
        }
        .header {
            font-size: 18px;
            font-weight: bold;
            color: #3897f0;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #3897f0;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.active { background: #ed4956; box-shadow: 0 0 8px #ed4956; }
        
        .btn {
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:hover { background: #444; border-color: #3897f0; }
        .btn.active { background: #ed4956; border-color: #ff5a60; }
        .btn.secondary { background: #222; border-color: #444; color: #aaa; }
        
        .info {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            line-height: 1.4;
        }
        #stats {
            background: #000;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            margin-bottom: 10px;
            color: #4af626;
        }
    </style>
</head>
<body>
    <div class="header">
        InstaGem Pro
        <span id="indicator" class="status-dot"></span>
    </div>
    
    <div id="stats">Steps: 0 | Idle</div>

    <button class="btn" id="record-btn">Start Recording</button>
    <button class="btn" id="play-btn">Play Script</button>
    <button class="btn secondary" id="generate-btn">Copy Console Code</button>

    <div class="info">
        Actions recorded in the current tab will persist even after page refresh.
    </div>

    <script src="popup.js"></script>
</body>
</html>
